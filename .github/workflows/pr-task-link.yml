name: PR task link (advisory)

# Nudge, not a gate: warns when a PR has no brain task work-key. Close happens on merge
# via aios-work-sync.yml (which needs the AIOS_* secrets configured to actually fire).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  work-key:
    name: PR references a brain task
    runs-on: ubuntu-latest
    steps:
      - name: Check for an AIOS work-key
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const ev = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const pr = ev.pull_request || {};
          const text = [pr.title, pr.body || "", pr.head?.ref || ""].join("\n");
          const re = /\b(?:AIOS-Work:\s*)?([A-Z][A-Z0-9]+-\d+|[A-Z]\d+(?:\.\d+)*)\b/g;
          const keys = [...new Set([...text.matchAll(re)].map((m) => m[1]))];
          if (keys.length) {
            console.log(`Found work key(s): ${keys.join(", ")} — merge will advance the matching brain task to Done.`);
          } else {
            console.log("::warning title=No brain task linked::This PR has no AIOS work-key (e.g. `AIOS-Work: AIO-72`). If this work should be tracked, link or create a brain task first. (Advisory — not blocking.)");
          }
          NODE
